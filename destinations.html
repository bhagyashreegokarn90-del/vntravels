<!DOCTYPE html>
<html lang="en">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>

    *{
        box-sizing: border-box;
    }

    body {
        background-color: rgba(236, 183, 232, 0.84);
        margin: 0;
        padding: 0;
    }

    .left {
        padding: 20px;
        width: 20%;
        display: inline-block;
        vertical-align: top;
    }

    main {
        background-color: rgba(255, 253, 255, 0.84);
        padding: 20px;
        width: 60%;
        display: inline-block;
        vertical-align: top;
    }

    .right {
        background-color: lightblue;
        padding: 20px;
        width: 20%;
        display: inline-block;
        vertical-align: top;
    }

    .banner {
        width: 100%;
        max-width: 1024px;
        margin: 0 auto;
    }

    /* Main page content container */
    .main-content {
        padding: 20px;
        margin: 0;
    }

    /* The vertical right box */
    .right-box {
        position: relative;
        width: 100%;
        background-color: #f4f4f4;
        border-left: 2px solid #ccc;
        padding: 15px;
        box-sizing: border-box;
    }

    /* Destinations title styling */
    .destinations-title {
        text-align: center;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        font-size: 2.5em;
        margin: 20px 0;
        padding: 30px 10px;
        color: #333;
        z-index: 10;
        position: relative;
    }

    /* width */
    ::-webkit-scrollbar {
        width: 10px;
    }

    /* Track */
    ::-webkit-scrollbar-track {
        background: #f1f1f1; 
    }
    
    /* Handle */
    ::-webkit-scrollbar-thumb {
        background: #888; 
    }

    /* Handle on hover */
    ::-webkit-scrollbar-thumb:hover {
        background: #555; 
    }

    /* Mobile responsiveness */
    @media screen and (max-width: 800px) {
        .left, main, .right {
            width: 100%;
            display: block;
            padding: 15px;
        }

        .main-content {
            margin: 0;
            padding: 15px;
        }

        .right-box {
            position: relative;
            height: auto;
            width: 100%;
            margin: 0;
            border: none;
        }

        .w3-top {
            position: relative !important;
        }

        .w3-container, .w3-content, .w3-wide {
            max-width: 100% !important;
            padding: 0 10px !important;
        }

        .destinations-title {
            font-size: 1.8em;
            padding: 20px 10px;
            margin: 10px 0;
        }
    }

    @media screen and (max-width: 480px) {
        body {
            font-size: 14px;
        }

        .left, main, .right {
            padding: 10px;
        }

        h1, h2, h3 {
            font-size: 1.2em;
        }

        .w3-bar-item {
            font-size: 12px;
            padding: 10px 8px !important;
        }

        .destinations-title {
            font-size: 1.4em;
            padding: 15px 8px;
            margin: 5px 0;
        }
    }

</style>

<body>

</html>
