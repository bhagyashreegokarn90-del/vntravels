<!DOCTYPE html>
<html lang="en">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>

    *{
        box-sizing: border-box;
    }

    body {
        background-color: rgba(64, 19, 61, 0.84);
        margin: 0;
        padding: 0;
    }

    .container {
        width: 100%;
        max-width: 1200px;
        padding: 0 20px;
        margin: 0 auto;
    }
    
    img {
        max-width: 100%;
        height: auto;
        display: block;
    }

    /* legacy column styles (not used with flex layout below) */
    .left {
        padding: 20px;
        width: 20%;
        display: inline-block;
        vertical-align: top;
    }

    main {
        background-color: rgba(64, 19, 61, 0.84);
        padding: 20px;
        width: 60%;
        display: inline-block;
        vertical-align: top;
    }

    .right {
        background-color: lightblue;
        padding: 20px;
        width: 20%;
        display: inline-block;
        vertical-align: top;
    }

    .banner {
        width: 100%;
        max-width: 1024px;
        margin: 0 auto;
    }

    /* Logo styling */
    .logo-container {
        text-align: center;
        padding: 20px 0;
    }

    .logo-container img {
        width: 800px;
        height: auto;
        position: center;
    }

    /* Page layout: main content + right sidebar */
    .page {
        display: flex;
        align-items: flex-start; /* align tops */
        gap: 24px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
    }

    /* main takes remaining space */
    .main-content {
        flex: 1 1 auto;
        min-width: 0;
        padding: 20px;
        background-color: rgba(64, 19, 61, 0.84);
    }

    /* right sidebar fixed width and always on the right */
    .right-box {
        width: 320px;        /* choose desired width */
        flex: 0 0 320px;    /* don't grow or shrink */
        background-color: #f4f4f4;
        border-left: 2px solid #ccc;
        padding: 15px;
        box-sizing: border-box;
        position: relative;
    }

    /* If you prefer the sidebar fixed to the viewport, uncomment below and keep .content margin-right */
    /*
    .right-box {
      position: fixed;
      right: 20px;
      top: 120px;
      width: 300px;
    }
    .main-content { margin-right: 340px; }
    */

    /* width */
    ::-webkit-scrollbar {
        width: 10px;
    }

    /* Track */
    ::-webkit-scrollbar-track {
        background: #f1f1f1; 
    }
    
    /* Handle */
    ::-webkit-scrollbar-thumb {
        background: #888; 
    }

    /* Handle on hover */
    ::-webkit-scrollbar-thumb:hover {
        background: #555; 
    }

    .modern-blink {
        animation: flash-animation 1s step-start infinite;
    }

    @keyframes flash-animation {
        50% { opacity: 0; }
    }

    /* Mobile responsiveness */
    @media screen and (max-width: 800px) {
        .page { flex-direction: column; padding: 10px; }
        .right-box, .main-content { width: 100%; flex: none; padding: 15px; }

        .main-content {
            margin: 0;
            padding: 15px;
        }

        .right-box {
            position: relative;
            height: auto;
        }

        .w3-top {
            position: relative !important;
        }

        .container, .w3-content, .w3-wide {
            max-width: 100% !important;
            padding: 0 10px !important;
        }

        .logo-container img {
            width: 200px;
        }
    }

    @media screen and (max-width: 480px) {
        body {
            font-size: 14px;
        }

        .left, main, .right {
            padding: 10px;
        }

        h1, h2, h3 {
            font-size: 1.2em;
        }

        .w3-bar-item {
            font-size: 12px;
            padding: 10px 8px !important;
        }

        .logo-container img {
            width: 150px;
        }
    }

</style>

<body>

 <div  id="home" class="w3-container">
   <div class="w3-top w3-bar w3-black">
     <a href="index.html" class="w3-bar-item w3-button">HOME</a>
     <a href="aboutvnt.html" class="w3-bar-item w3-button">ABOUT US</a>
      <a href="contact.html" class="w3-bar-item w3-button">CONTACT</a>
     <a href="destinations.html" class="w3-bar-item w3-button">DESTINATIONS</a>
     </div>
     </div>


<div class="logo-container">
   <img class="w3-image" src="LOGO.jpg" alt="logo">  
</div>

<!-- PAGE: main content on the left, sidebar on the right -->
<div class="page">
  <main class="main-content">
    <h1 class="w3-center w3-animate-top w3-text-blue"><marquee><span style="font-family: Cursive; font-size: 24px;">EXPLORE NEW DESTINATIONS WITH US</span></marquee></h1>
    <h3 class="w3-center w3-animate-left w3-text-green modern-blink">DISCOVER THE WORLD WITH US</h3>

    <div class="w3-content w3-wide" style="max-width: 1000px; max-height: 50%; width: 100%;">
      <!-- additional main content (keeps images/statements) -->
      <p class="w3-center w3-text-blue">Welcome to VN Travels. We help you plan your trips and explore top destinations.</p>
    </div>

    <script>
    (function () {
      var STORAGE_KEY = 'vn_sidebar_collapsed';

      function updateIcon(btn, collapsed) {
        var icon = btn.querySelector('i');
        if (!icon) return;
        icon.classList.toggle('fa-chevron-right', !collapsed);
        icon.classList.toggle('fa-chevron-left', collapsed);
      }

      function setCollapsed(collapsed) {
        if (collapsed) {
          document.body.classList.add('sidebar-collapsed');
          localStorage.setItem(STORAGE_KEY, '1');
        } else {
          document.body.classList.remove('sidebar-collapsed');
          localStorage.removeItem(STORAGE_KEY);
        }

        // update all toggles on the page
        document.querySelectorAll('.sidebar-toggle').forEach(function (btn) {
          btn.setAttribute('aria-pressed', collapsed ? 'true' : 'false');
          updateIcon(btn, collapsed);
        });
      }

      function initToggle() {
        // restore persisted state
        var persisted = localStorage.getItem(STORAGE_KEY) === '1';
        if (persisted) setCollapsed(true);

        document.querySelectorAll('.sidebar-toggle').forEach(function (btn) {
          // set initial icon/aria
          var isPressed = btn.getAttribute('aria-pressed') === 'true';
          updateIcon(btn, isPressed);

          btn.addEventListener('click', function () {
            var pressed = btn.getAttribute('aria-pressed') === 'true';
            setCollapsed(!pressed);
          });
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initToggle);
      } else {
        initToggle();
      }
    })();
    </script>

  </main>

  <aside class="right-box">
    <button class="sidebar-toggle" aria-label="Toggle sidebar" aria-pressed="false" title="Toggle sidebar">
      <i class="fa fa-chevron-right" aria-hidden="true"></i>
    </button>
    <h1 class="w3-center w3-animate-top w3-text-blue">welcome.....</h1>
    <h2 class="w3-center w3-animate-bottom w3-text-green">to our website!</h2>

    <p><i class="fa fa-spinner w3-spin" style="font-size:64px"></i></p>

    <h3 class="w3-center w3-animate-left w3-text-purple">We are here to help you plan your next adventure!</h3>

    <div class="w3-container w3-content w3-wide" style="max-width: 1000px; max-height: 100%; width: 100%;">
      <img class="slides" src="50451.jpg" style="width: 100%; height: auto; display: none;">
      <img class="slides" src="50459.jpg" style="width: 100%; height: auto; display: none;">
      <img class="slides" src="50449.jpg" style="width: 100%; height: auto; display: none;">
      <img class="slides" src="bus.png" style="width: 100%; height: auto; display: none;">
    </div>

    <script>
    var myIndex = 0;
    carousel();

    function carousel() {
      var i;
      var x = document.getElementsByClassName("slides");
      for (i = 0; i < x.length; i++) {
        x[i].style.display = "none";  
      }
      myIndex++;
      if (myIndex > x.length) {myIndex = 1}    
      if (x[myIndex-1]) x[myIndex-1].style.display = "block";  
      setTimeout(carousel, 2000); // Change image every 2 seconds
    }
    </script>

  </aside>
</div>


</body>
</html>
